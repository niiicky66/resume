/* ============================================================

/* ----- Top nav ----- */

}
.nav-inner {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding-block: 14px;

  align-items: center;

.nav-brand:hover .nav-logo { transform: rotate(-12deg); }

/* Logo hover draw animation */
@property --enso-sweep {
  syntax: '<angle>';
  inherits: false;
  initial-value: 360deg;
}
.nav-logo {
  --enso-sweep: 360deg;
  -webkit-mask: conic-gradient(from 30deg, transparent 0deg, transparent calc(360deg - var(--enso-sweep)), #000 calc(360deg - var(--enso-sweep)), #000 360deg);
          mask: conic-gradient(from 30deg, transparent 0deg, transparent calc(360deg - var(--enso-sweep)), #000 calc(360deg - var(--enso-sweep)), #000 360deg);
}
html[data-logohover="on"] .nav-brand:hover .nav-logo {
  animation: enso-draw 1300ms linear forwards;
}
@keyframes enso-draw {
   0% { --enso-sweep:   0deg; }
   3% { --enso-sweep:  44deg; }
   6% { --enso-sweep:  90deg; }
  16% { --enso-sweep: 102deg; }
  29% { --enso-sweep: 142deg; }
  42% { --enso-sweep: 196deg; }
  60% { --enso-sweep: 360deg; }
  80% { --enso-sweep: 360deg; }
  88% { --enso-sweep: 269deg; }
  94% { --enso-sweep: 170deg; }
 100% { --enso-sweep:  72deg; }
}
.nav-brand-tx { transition: opacity var(--dur-base); }
.nav-brand em { font-style: italic; color: var(--accent-flame2); }

}
.nav-links a::before {
  content: attr(data-num);

}
.nav-links a:hover { color: var(--accent-flame2); }
.nav-meta {
  justify-self: end;
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  letter-spacing: var(--tk-eyebrow);

}

.nav-meta .dot {

@keyframes live-pulse {

/* ============================================================
   HERO
   ============================================================ */
.hero {
  height: 100svh;
  background: var(--paper);
  padding-top: 0;

}
.hero > .container {

}

}

}

}
.sp-eye {

}
.sp-eye .sep { width: 32px; height: 1px; background: var(--rule); display: inline-block; }
.sp-eye .live { width: 6px; height: 6px; border-radius: 50%; background: var(--data-up); display: inline-block; animation: live-pulse 2s ease-in-out infinite; margin-right: 4px; }
.sp-head {

}

}
.sp-desc {

  line-height: 1.55;
  color: var(--ink);

}
.sp-desc em { font-style: italic; color: var(--accent-flame2); }
/* 按钮 hover：还原 dria.com "See our companies" 按钮的机制 ——
   静止态是赭石红底 + 米白字，右侧常驻一个被裁切成小圆徽章的米白圆（clip-path 让它只露出贴合箭头的一小块）；
   hover 时圆徽章的 clip-path 缓慢展开盖满整个按钮，圆徽章内部自带一套对比色文字+箭头，
   所以文字露出来的瞬间颜色就是对的，不需要额外做文字变色过渡。
   箭头用等宽容器 + overflow:hidden 裁切两枚重叠图标做"滑出/滑入"替换（容器宽度按图标真实渲染宽度写死，避免裁切错位）。 */
.sp-btn {
  position: relative;
  overflow: hidden;
  height: 64px;
  font-family: var(--font-ui);
  font-weight: 500;
  font-size: 17px;
  background: var(--accent-rust);
  color: var(--paper);
  border: none;
  border-radius: 999px;
  white-space: nowrap;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}
.sp-btn-inner {
  position: relative;
  z-index: 1;
  display: inline-flex;
  align-items: center;
  padding: 0 62px 0 20px;
}
.sp-btn-circle {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--paper);
  color: var(--accent-rust);
  border-radius: 999px;
  /* 静止态：裁出一个贴右边、上下左右各留白的正圆徽章（宽高都算成 64-2*10=44px，避免和外层圆角在角落打架而"探出去"） */
  clip-path: inset(10px 10px 10px calc(100% - 54px) round 999px);
  transition: clip-path 0.45s cubic-bezier(0.895, 0.03, 0.685, 0.22);
  will-change: clip-path;
  transform: translateZ(0);
}
.sp-btn:hover .sp-btn-circle { clip-path: inset(2px round 999px); }
.sp-btn-circle-inner {
  display: inline-flex;
  align-items: center;
  padding: 0 62px 0 20px;
}
/* 箭头脱离文字所在的 flex 行，直接按"贴右边"绝对定位，
   这样徽章还很小的时候箭头也精确落在圆心，不会因为跟着整行内容一起走位而偏出去 */
.sp-btn-arrow-wrap {
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 9px;
  justify-content: flex-end;
  align-items: center;
  width: 17px;
  height: 14px;
  overflow: hidden;
}
.sp-btn-arrow { width: 17px; height: 14px; flex: none; transition: transform 0.45s cubic-bezier(0.895, 0.03, 0.685, 0.22); }
.sp-btn:hover .sp-btn-arrow { transform: translateX(calc(100% + 9px)); }
.sp-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, max-content));
  gap: clamp(16px, 2.4vw, 32px) clamp(20px, 3vw, 44px);
  padding-top: var(--s-4);
  border-top: 1px solid var(--rule);

}
.sp-meta .k {

  font-size: var(--fs-caption);

  text-transform: uppercase;
  color: var(--ink-sage);

}
.sp-meta .v { font-family: var(--font-body); font-size: var(--fs-body-s); color: var(--ink); font-weight: 500; }
.sp-meta .v a { border-bottom: 1px solid var(--rule); padding-bottom: 1px; transition: color var(--dur-fast), border-color var(--dur-fast); }
.sp-meta .v a:hover { color: var(--accent-flame2); border-color: var(--accent-flame2); }
.sp-side {
  background: var(--ink-primary);
  color: var(--paper);
  padding: clamp(36px, 4vw, 72px);
  display: flex; flex-direction: column; justify-content: space-between; gap: var(--s-6);
  position: relative; z-index: 2;

}
.sp-side .sp-watermark {

}
.sp-side > * { position: relative; z-index: 1; }
html[data-watermark="off"] .sp-side .sp-watermark { display: none; }
.sp-side-top { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--s-5); }
.sp-brandline {
  font-family: var(--font-display);
  font-style: italic;

}

.sp-side-foot {

.sp-side-foot .scroll i { animation: cover-bob 2.4s ease-in-out infinite; font-style: normal; }
@keyframes cover-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3px); } }

@media (max-width: 880px) {

}

/* Hero entrance animations */
.sp-card.play .sp-cover { animation: sp-wipe 820ms cubic-bezier(0.85,0,0.15,1) forwards; }
.sp-card.play .sp-head  { clip-path: inset(-12% 100% -12% 0); animation: sp-draw 1000ms var(--ease-out) 360ms forwards; }
.sp-card.play .sp-eye   { opacity: 0; animation: sp-rise 700ms var(--ease-out) 300ms forwards; }
.sp-card.play .sp-bottom,
.sp-card.play .sp-meta  { opacity: 0; animation: sp-rise 760ms var(--ease-out) 820ms forwards; }
.sp-card.play .sp-meta  { animation-delay: 960ms; }
.sp-card.play .sp-side  { opacity: 0; animation: sp-sidefade 700ms var(--ease-out) 500ms forwards; }
.sp-card.play .sp-side > * { opacity: 0; animation: sp-rise 760ms var(--ease-out) 660ms forwards; }
.sp-card.breathe .sp-num { animation: sp-breathe 6s ease-in-out 2s infinite; }
@keyframes sp-wipe { from { transform: scaleX(1); } to { transform: scaleX(0); } }
@keyframes sp-draw { from { clip-path: inset(-12% 100% -12% 0); } to { clip-path: inset(-12% 0 -12% 0); } }
@keyframes sp-rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
@keyframes sp-sidefade { from { opacity: 0; } to { opacity: 1; } }
@keyframes sp-breathe { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-3px) scale(1.015); } }

html[data-motion="off"] .sp-card .sp-cover { transform: scaleX(0) !important; }
html[data-motion="off"] .sp-card * { opacity: 1 !important; transform: none !important; clip-path: none !important; }
html.cover-settled .sp-card .sp-cover { transform: scaleX(0) !important; }
html.cover-settled .sp-card .sp-eye,
html.cover-settled .sp-card .sp-head,
html.cover-settled .sp-card .sp-bottom,
html.cover-settled .sp-card .sp-meta,
html.cover-settled .sp-card .sp-side,
html.cover-settled .sp-card .sp-side > * {
  opacity: 1 !important; transform: none !important; clip-path: none !important;
}

/* ----- Section header ----- */
.s-head {
  position: relative;
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: var(--s-5);
  align-items: baseline;
  padding-block: var(--s-4);
  border-top: none;
  margin-bottom: var(--s-8);
}
.s-head::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: var(--ink-primary);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 760ms var(--ease-out);
}
.s-head.is-in::before { transform: scaleX(1); }
html[data-motion="off"] .s-head::before { transform: scaleX(1) !important; }

/* 滚动浮现：每个 [data-reveal] 元素首次进入视口时淡入 + 轻微上移，
   之后保持常驻（往回滑不会消失），还没进入视口的内容会在下次滚到时正常播放。 */
[data-reveal] {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 820ms cubic-bezier(0.22, 1, 0.36, 1), transform 820ms cubic-bezier(0.22, 1, 0.36, 1);
  transition-delay: var(--reveal-delay, 0ms);
}
[data-reveal].is-in { opacity: 1; transform: translateY(0); }
@media (prefers-reduced-motion: reduce) {
  [data-reveal] { opacity: 1; transform: none; transition: none; }
}
.s-head__idx {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  letter-spacing: var(--tk-eyebrow);
  color: var(--ink-primary);
  text-transform: uppercase;
  padding-top: 6px;
}
.s-head__title {
  font-family: var(--font-display);
  font-size: var(--fs-h1);
  line-height: var(--lh-tight);
  letter-spacing: var(--tk-tight);
  color: var(--ink);
}
.s-head__title em { font-style: italic; color: var(--accent-rust); }
.s-head__meta {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  letter-spacing: var(--tk-wide);
  color: var(--ink-moss);
  text-transform: uppercase;
}
@media (max-width: 680px) {
  .s-head { grid-template-columns: auto 1fr; }
  .s-head__meta { grid-column: 1 / -1; padding-top: 6px; }
}

section.s { padding-block: var(--s-10) var(--s-8); scroll-margin-top: 88px; }

.about-stat .lbl {
  font-family: var(--font-mono);

  letter-spacing: var(--tk-wide);
  text-transform: uppercase;
  color: var(--ink-sage);
  margin-top: auto;
}
@media (max-width: 900px) {
  .about-lead, .about-side { grid-column: 1 / -1; }
  .about-stats { grid-template-columns: repeat(2, 1fr); }
  .about-stat:nth-child(2) { border-right: 0; }
  .about-stat:nth-child(1), .about-stat:nth-child(2) { border-bottom: 1px solid var(--rule); }
}

/* ----- Pull quote ----- */
.pull {
  margin-block: var(--s-10);
  padding: var(--s-8) 0;
  border-block: 1px solid var(--ink-primary);
  text-align: center;
}
.pull p {
  font-family: var(--font-display);
  font-size: clamp(32px, 4vw, 56px);
  line-height: 1.2;
  letter-spacing: var(--tk-tight);
  color: var(--ink);
  max-width: 22ch;
  margin: 0 auto;
  text-wrap: balance;
}
.pull p em { font-style: italic; color: var(--accent-rust); }
.pull p::before,
.pull p::after {
  display: inline-block;
  color: var(--ink-moss);
  font-family: var(--font-display);
  font-style: italic;
  opacity: 0.5;
}
.pull p::before { content: '" '; margin-right: 4px; }
.pull p::after { content: ' "'; margin-left: 4px; }

/* ----- Experience ----- */
.exp-grid {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: var(--s-8);
  row-gap: var(--s-8);
}
.exp-aside {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  letter-spacing: var(--tk-wide);
  color: var(--ink-sage);
  text-transform: uppercase;
  position: sticky;
  top: 100px;
  align-self: start;
}
.exp-items { display: flex; flex-direction: column; gap: var(--s-8); }
.exp-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: var(--s-5);
  padding-bottom: var(--s-5);
  border-bottom: 1px dashed var(--rule);
}
.exp-item:last-child { border-bottom: 0; }
.exp-co {
  font-family: var(--font-display);
  font-size: clamp(28px, 2.6vw, 40px);
  line-height: 1.1;
  color: var(--ink);
  letter-spacing: var(--tk-tight);
  margin-bottom: 6px;
}
.exp-co em { font-style: italic; color: var(--accent-rust); }
.exp-role {
  font-family: var(--font-body);
  font-size: var(--fs-body-l);
  color: var(--ink-primary);
  font-weight: 500;
  margin-bottom: var(--s-3);
}
.exp-desc {
  font-size: var(--fs-body);
  line-height: 1.7;
  color: var(--ink);
  max-width: 56ch;
  margin-bottom: var(--s-3);
}
.exp-desc em { font-style: italic; color: var(--accent-rust); font-family: var(--font-display); }
.exp-bullets {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: var(--fs-body-s);
  color: var(--ink-sage);
  line-height: 1.7;
}
.exp-bullets li {
  padding-left: 18px;
  position: relative;
}
.exp-bullets li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12px;
  width: 10px; height: 1px;
  background: var(--ink-sage);
}
.exp-date {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  letter-spacing: var(--tk-wide);
  color: var(--ink-sage);
  white-space: nowrap;
  padding-top: 14px;
}
.exp-date .now {
  color: var(--data-up);
  font-weight: 600;
}
@media (max-width: 900px) {
  .exp-grid { grid-template-columns: 1fr; }
  .exp-aside { position: static; }
  .exp-item { grid-template-columns: 1fr; }
  .exp-date { padding-top: 0; }
}

/* ----- Projects ----- */
.proj-list {
  display: flex;
  flex-direction: column;
}
.proj-row {
  display: grid;
  grid-template-columns: 80px 100px 1fr auto;
  gap: var(--s-5);
  align-items: baseline;
  padding: var(--s-5) var(--s-3);
  margin-inline: calc(var(--s-3) * -1);
  border-top: 1px solid var(--ink-primary);
  cursor: pointer;
  position: relative;
  transition: background var(--dur-fast) var(--ease-out),
              padding-left var(--dur-fast) var(--ease-out);
  list-style: none;
}
.proj-list .proj-row:last-of-type { border-bottom: 1px solid var(--ink-primary); }
.proj-row::before {
  content: '';
  position: absolute;
  left: 0; top: -1px; bottom: 0;
  width: 2px;
  background: var(--accent-rust);
  transform: scaleY(0);
  transform-origin: top center;
  transition: transform var(--dur-base) var(--ease-out);
}
.proj-row:hover::before,
.proj-row[aria-expanded="true"]::before { transform: scaleY(1); }
html[data-motion="off"] .proj-row::before { transition: none; }
.proj-row:hover {
  background: var(--paper-soft);
  padding-left: calc(var(--s-3) + 12px);
}
.proj-row:hover .idx { color: var(--accent-rust); }
.proj-row .idx {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  letter-spacing: var(--tk-wide);
  color: var(--ink-primary);
}
.proj-row .yr {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  color: var(--ink-sage);
  letter-spacing: var(--tk-wide);
}
.proj-row .ttl {
  font-family: var(--font-display);
  font-size: clamp(24px, 2.2vw, 34px);
  line-height: 1.2;
  color: var(--ink);
  letter-spacing: var(--tk-tight);
}
.proj-row .ttl em { font-style: italic; color: var(--accent-rust); }
.proj-row .arr {
  font-family: var(--font-mono);
  font-size: 22px;
  color: var(--ink-sage);
  transition: transform var(--dur-fast) var(--ease-out), color var(--dur-fast);
}
.proj-row:hover .arr { color: var(--accent-rust); transform: rotate(45deg); }
.proj-row[aria-expanded="true"] .arr { transform: rotate(135deg); color: var(--accent-rust); }
.proj-row[aria-expanded="true"] { background: var(--paper-soft); }

.proj-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows var(--dur-base) var(--ease-out);
}
.proj-row[aria-expanded="true"] + .proj-body { grid-template-rows: 1fr; }
.proj-body-inner {
  min-height: 0;
  overflow: hidden;
  background: var(--paper-soft);
  margin-inline: calc(var(--s-3) * -1);
}
.proj-body-grid {
  display: grid;
  grid-template-columns: 1fr 240px;
  gap: var(--s-8);
  padding: var(--s-5) var(--s-3) var(--s-8) calc(var(--s-3) + 192px);
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity var(--dur-base) var(--ease-out),
              transform var(--dur-base) var(--ease-out);
  transition-delay: 0ms;
}
.proj-row[aria-expanded="true"] + .proj-body .proj-body-grid {
  opacity: 1;
  transform: translateY(0);
  transition-delay: 80ms;
}
.proj-summary {
  font-size: var(--fs-body-l);
  line-height: 1.6;
  color: var(--ink);
  max-width: 56ch;
  margin-bottom: var(--s-5);
}
.proj-summary em { font-style: italic; color: var(--accent-rust); font-family: var(--font-display); }
.proj-detail-block {
  margin-bottom: var(--s-5);
}
.proj-detail-block .lbl {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  letter-spacing: var(--tk-eyebrow);
  text-transform: uppercase;
  color: var(--ink-primary);
  margin-bottom: var(--s-2);
  display: block;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--rule);
}
.proj-detail-block ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: var(--fs-body-s);
  color: var(--ink);
  line-height: 1.7;
}
.proj-detail-block ul li {
  padding-left: 16px;
  position: relative;
}
.proj-detail-block ul li::before {
  content: '·';
  position: absolute;
  left: 4px;
  color: var(--ink-sage);
}
.proj-side .lbl {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  letter-spacing: var(--tk-eyebrow);
  text-transform: uppercase;
  color: var(--ink-primary);
  margin-bottom: var(--s-3);
  display: block;
}
.proj-side .impact {
  font-size: clamp(32px, 3vw, 52px);
  line-height: 1;
  color: var(--ink-primary);
  letter-spacing: var(--tk-tight);
  margin-bottom: var(--s-2);
}
.proj-side .impact .u {
  font-family: var(--font-mono);
  font-size: 0.3em;
  vertical-align: super;
  color: var(--ink-sage);
  margin-left: 4px;
  letter-spacing: var(--tk-wide);
  font-variant-numeric: normal;
}
.proj-side .impact-lbl {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  color: var(--ink-sage);
  letter-spacing: var(--tk-wide);
  text-transform: uppercase;
  border-top: 1px solid var(--rule);
  padding-top: var(--s-3);
  margin-top: var(--s-3);
}
.proj-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: var(--s-3);
}
.proj-tags .chip { font-size: 10px; padding: 4px 10px; }

@media (max-width: 900px) {
  .proj-row { grid-template-columns: 56px 1fr auto; grid-template-areas: "idx ttl arr" "idx yr arr"; }
  .proj-row .idx { grid-area: idx; }
  .proj-row .yr { grid-area: yr; }
  .proj-row .ttl { grid-area: ttl; }
  .proj-row .arr { grid-area: arr; align-self: center; }
  .proj-body-grid {
    grid-template-columns: 1fr;
    padding: var(--s-5) var(--s-3) var(--s-8) calc(var(--s-3) + 56px);
  }
}

/* ----- Skills matrix ----- */
.sk-matrix {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--ink-primary);
  border-left: 1px solid var(--rule);
}
.sk-cell {
  padding: var(--s-5) var(--s-4);
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  transition: background var(--dur-fast) var(--ease-out);
}
.sk-cell:hover { background: var(--paper-soft); }
.sk-cell .ix {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  color: var(--ink-primary);
  letter-spacing: var(--tk-wide);
}
.sk-cell h3 {
  font-family: var(--font-display);
  font-size: clamp(22px, 2vw, 30px);
  font-weight: 400;
  color: var(--ink);
  margin: 6px 0 var(--s-3);
  letter-spacing: var(--tk-tight);
  line-height: 1.1;
}
.sk-cell h3 em { font-style: italic; color: var(--accent-rust); }
.sk-cell ul {
  list-style: none;
  font-size: var(--fs-body-s);
  color: var(--ink);
  line-height: 1.6;
}
.sk-cell ul li {
  padding: 6px 0;
  border-bottom: 1px dotted var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.sk-cell ul li:last-child { border-bottom: 0; }
.sk-cell ul li .lvl {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-moss);
  letter-spacing: var(--tk-wide);
}
@media (max-width: 900px) {
  .sk-matrix { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 540px) {
  .sk-matrix { grid-template-columns: 1fr; }
}

/* ----- Contact ----- */
.contact-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: var(--col-gap);
  row-gap: var(--s-8);
}
.contact-lead {
  grid-column: 1 / span 7;
  font-family: var(--font-display);
  font-size: clamp(36px, 4vw, 64px);
  line-height: 1.1;
  letter-spacing: var(--tk-display);
  color: var(--ink);
  text-wrap: balance;
}
.contact-lead em { font-style: italic; color: var(--accent-rust); }
.contact-lead .sage { font-style: italic; color: var(--ink-primary); }
.contact-meta {
  grid-column: 9 / span 4;
  display: flex;
  flex-direction: column;
  gap: var(--s-3);
  align-self: end;
}
.contact-meta-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: var(--s-3) 0;
  border-top: 1px solid var(--rule);
}
.contact-meta-row:first-child { border-top: 1px solid var(--ink-primary); }
.contact-meta-row .k {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  letter-spacing: var(--tk-eyebrow);
  text-transform: uppercase;
  color: var(--ink-sage);
}
.contact-meta-row .v {
  font-size: var(--fs-body-l);
  color: var(--ink-primary);
}
.contact-meta-row .v a {
  border-bottom: 1px solid var(--ink-primary);
  transition: color var(--dur-fast), border-color var(--dur-fast);
}
.contact-meta-row .v a:hover { color: var(--accent-rust); border-color: var(--accent-rust); }
@media (max-width: 900px) {
  .contact-lead, .contact-meta { grid-column: 1 / -1; }
}

/* ----- Footer ----- */
.foot {
  background: var(--ink-primary);
  color: var(--paper);
  padding-block: var(--s-12) var(--s-6);
  margin-top: var(--s-12);
  position: relative;
  overflow: hidden;
}
.foot-sig {
  font-family: var(--font-display);
  font-size: clamp(48px, 8vw, 144px);
  line-height: 0.95;
  letter-spacing: var(--tk-display);
  color: var(--paper);
  text-wrap: balance;
  margin-bottom: var(--s-8);
}
.foot-sig em { font-style: italic; color: var(--accent-yellow); }
.foot-cols {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--s-5);
  padding-block: var(--s-5);
  border-top: 1px solid var(--ink-sage);
  margin-bottom: var(--s-8);
}
.foot-col h4 {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  letter-spacing: var(--tk-eyebrow);
  text-transform: uppercase;
  color: var(--ink-moss);
  margin-bottom: var(--s-3);
  font-weight: 500;
}
.foot-col a, .foot-col p {
  color: var(--paper-dust);
  font-size: var(--fs-body-s);
  display: block;
  padding-block: 4px;
  transition: color var(--dur-fast);
}
.foot-col a:hover { color: var(--accent-clay); }
.foot-bottom {
  display: flex;
  justify-content: space-between;
  padding-top: var(--s-5);
  border-top: 1px solid var(--ink-sage);
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  letter-spacing: var(--tk-wide);
  color: var(--ink-moss);
  text-transform: uppercase;
  flex-wrap: wrap;
  gap: var(--s-3);
}
.foot-name-mark {
  position: absolute;
  bottom: 6%;
  right: var(--gutter-x);
  font-family: var(--font-hand);
  font-size: 80px;
  color: var(--accent-clay);
  opacity: 0.18;
  transform: rotate(-4deg);
  pointer-events: none;
  user-select: none;
}
@media (max-width: 900px) {
  .foot-cols { grid-template-columns: repeat(2, 1fr); }
  .foot-name-mark { display: none; }
}

/* ----- Cursor blink ----- */
.blink::after {
  content: '_';
  margin-left: 2px;
  color: var(--accent-rust);
  animation: blink 1.2s steps(2) infinite;
}
@keyframes blink { to { opacity: 0; } }

/* Density modes */
html[data-density="compact"] { --gutter-x: clamp(20px, 4vw, 64px); }
html[data-density="compact"] section.s { padding-block: var(--s-8) var(--s-6); }
html[data-density="compact"] .hero { padding-top: calc(var(--s-16) + 60px); padding-bottom: var(--s-12); }
html[data-density="comfy"] section.s { padding-block: var(--s-12) var(--s-10); }
html[data-density="comfy"] .hero { padding-bottom: var(--s-24); }

/* Font scale */
html[data-fs="s"] { font-size: 14px; }
html[data-fs="m"] { font-size: 16px; }
html[data-fs="l"] { font-size: 18px; }

/* Italic emphasis consistency */
.nav-brand em,
.s-head__title em,
.about-lead em,
.pull p em,
.exp-co em,
.exp-desc em,
.proj-row .ttl em,
.proj-summary em,
.sk-cell h3 em,
.contact-lead em { color: var(--accent-flame2); }

/* ============================================================
   NUMERAL STYLING · <num> 标签
   resume.json 里 <num>1100</num> 被 parseMarkup 转成 <span class="num">1100</span>
   之前缺样式 → 渲染为默认等高数字。补上后能拿到 Source Serif 4 的旧体数字下沉
   ============================================================ */
/* 旧体数字特性只在这一处声明，.sp-num / .about-stat .val / .proj-side .impact
   都是裸数字大字块（不套 <span class="num">），一并列进选择器共用，避免四处重复。 */
.num, .sp-num, .about-stat .val, .proj-side .impact {
  font-family: var(--font-num);       /* Source Serif 4 OT · 完整可变字体才带 onum 特性 */
  font-feature-settings: 'onum' 1, 'pnum' 1;
  font-variant-numeric: oldstyle-nums proportional-nums;
}
.num {
  letter-spacing: 0.01em;              /* 直立展示；被 <em> 包裹时自然继承斜体与强调色（对齐 type-lab 参照） */
}

/* Print · A4 · 打印/导出 PDF 时使用 */
@page {
  size: A4;
  margin: 12mm 14mm;
}
@media print {
  .nav, .foot-name-mark { display: none !important; }
  html, body { background: white !important; color: black !important; }
  /* 保留强调色（斜体的赭石红），否则简历打印后会失去视觉重点 */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  a { color: inherit; text-decoration: none; }
  .proj-body { grid-template-rows: 1fr !important; }
  .proj-body-grid { opacity: 1 !important; transform: none !important; }
  .proj-body-inner { background: white !important; }
  /* 分页控制：项目卡与经历段落尽量不跨页 */
  section.s { page-break-inside: avoid; break-inside: avoid; }
  .proj-row, .exp-item { page-break-inside: avoid; break-inside: avoid; }
  h1, h2, h3 { page-break-after: avoid; break-after: avoid; }
}
</style>

<!-- ============================================================
     DATA RENDERER — loads resume.json and renders all sections
     ============================================================ -->
<script>
(async function () {
  // 统一的致命错误横幅：fetch 失败、resume.json 缺字段、渲染中途抛异常都走这里，
  // 而不是让某个 section 静默崩掉、后面的内容全部不渲染却什么提示都没有。
  function showFatalError(title, detail) {
    document.body.insertAdjacentHTML('afterbegin',
      `<div style="position:fixed;top:0;left:0;right:0;background:#D33900;color:#fff;padding:12px 20px;font-family:monospace;z-index:9999">
        ⚠ ${title}<br>
        错误: ${String(detail)}
      </div>`);
  }

  /* ---------- 1. Fetch data ---------- */
  let R;
  try {
    const res = await fetch('data/resume.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    R = await res.json();
  } catch (e) {
    showFatalError('无法加载 data/resume.json — 请确保通过 HTTP 服务器访问（不要直接双击打开 HTML）', e.message);
    return;
  }

  try {

  /* ---------- 2. Helpers: escape + parse inline markup ---------- */
  // resume.json 里的字段最终都是通过 innerHTML 插入的，任何原样拼接的文本
  // （公司名、日期、标签……）一旦包含 < & 之类字符都会破坏结构甚至变成注入点。
  // 所有"纯文本"字段都必须先过这个函数再拼进模板字符串。
  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  // 支持: <em>, <sage>, <num>, <br>, *bold italic* —— 这是 resume.json 里少数
  // 允许的"作者写的富文本"字段（标题/描述/引言）专用的迷你标记语言。
  // 先整体转义掉所有 HTML，再针对性地把这几个白名单标记换回真实标签，
  // 这样字段里任何意外出现的 < > 都不会破坏页面结构或被当成标签执行。
  function parseMarkup(str) {
    if (!str) return '';
    return escapeHtml(str)
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/&lt;br&gt;/g, '<br>')
      .replace(/&lt;em&gt;/g, '<em>')
      .replace(/&lt;\/em&gt;/g, '</em>')
      .replace(/&lt;num&gt;/g, '<span class="num">')
      .replace(/&lt;\/num&gt;/g, '</span>')
      .replace(/&lt;sage&gt;/g, '<span class="sage">')
      .replace(/&lt;\/sage&gt;/g, '</span>');
  }

  function titleHtml(arr) {
    return arr.map(t => typeof t === 'string' ? escapeHtml(t) : `<em>${escapeHtml(t.em)}</em>`).join('');
  }

  /* ---------- 3. Meta / page title ---------- */
  const M = R.meta;
  document.getElementById('page-title').textContent = M.pageTitle;
  document.getElementById('page-desc').setAttribute('content', M.metaDescription);

  /* ---------- 4. NAV ---------- */
  document.getElementById('nav-brand-link').setAttribute('aria-label', `${M.name} · 返回顶部`);
  document.getElementById('nav-name').innerHTML = `${escapeHtml(M.nameDisplay[0])}<em>${escapeHtml(M.nameDisplay[1])}</em>`;
  document.getElementById('nav-status-text').textContent = `${M.currentStatus} · ${M.currentCompany}`;

  /* ---------- 5. HERO ---------- */
  const H = R.hero;
  document.getElementById('hero-eyebrow').textContent = H.eyebrow;
  document.getElementById('hero-location-year').textContent = H.locationYear;
  document.getElementById('hero-headline').innerHTML = parseMarkup(H.headline);
  document.getElementById('hero-desc').innerHTML = parseMarkup(H.description);
  const cta = document.getElementById('hero-cta');
  cta.querySelectorAll('.hero-cta-label').forEach(el => { el.textContent = H.ctaText; });
  cta.href = H.ctaHref;

  // Hero meta (name/email/phone)
  document.getElementById('hero-meta').innerHTML = `
    <div><span class="k">现职</span><span class="v">${escapeHtml(M.currentCompany)} · ${escapeHtml(M.currentStatus)}</span></div>
    <div><span class="k">邮箱</span><span class="v"><a href="mailto:${escapeHtml(M.email)}">${escapeHtml(M.email)}</a></span></div>
    <div><span class="k">电话</span><span class="v"><a href="tel:${escapeHtml(M.phoneTel)}">${escapeHtml(M.phone)}</a></span></div>
  `;

  document.getElementById('hero-brandline').innerHTML = parseMarkup(H.brandLine);
  document.getElementById('hero-side-footer').textContent = H.sideFooter;

  // Hero stats
  document.getElementById('hero-stats').innerHTML = H.stats.map(s => `
    <div class="sp-fig">
      <div class="sp-num">${escapeHtml(s.value)}<span class="u">${escapeHtml(s.unit)}</span></div>
      <div class="sp-cap">${escapeHtml(s.caption)}</div>
    </div>
  `).join('');

  /* ---------- 6. ABOUT ---------- */
  const A = R.about;
  document.getElementById('about-meta').textContent = A.sectionMeta;
  document.getElementById('about-lead').innerHTML = parseMarkup(A.lead);
  document.getElementById('about-notebook').innerHTML = parseMarkup(A.notebook);
  document.getElementById('about-stats').innerHTML = A.stats.map(s => `
    <div class="about-stat">
      <div class="val">${escapeHtml(s.value)}<span class="u">${escapeHtml(s.unit)}</span></div>
      <div class="lbl">${escapeHtml(s.label)}</div>
    </div>
  `).join('');

  /* ---------- 7. PULL QUOTE ---------- */
  document.getElementById('pull-quote').innerHTML = parseMarkup(R.pullQuote);

  /* ---------- 8. EXPERIENCE ---------- */
  const exps = R.experience;
  // Compute meta — 用显式的 e.type 字段区分学历，而不是猜 role 文案里有没有
  // "B.B.A" 子串；文案改了/换语言，这里也不会跟着悄悄算错。
  const jobs = exps.filter(e => e.type !== 'education');
  const companies = jobs.length;
  const years = jobs.reduce((sum, e) => {
    const from = parseInt(e.dateFrom, 10);
    const to = e.isCurrent ? new Date().getFullYear() : parseInt(e.dateTo, 10);
    // dateFrom/dateTo 出了非数字年份（比如把 "现在" 误填到非当前岗位上），
    // 就跳过这一条别让 NaN 污染整个求和，导致文案显示 "NaN 年"。
    if (!Number.isFinite(from) || !Number.isFinite(to)) return sum;
    return sum + (to - from);
  }, 0);
  document.getElementById('exp-meta').textContent = `${companies} 公司 · ${years} 年`;

  document.getElementById('exp-items').innerHTML = exps.map(exp => {
    const coHtml = exp.companyEn
      ? `${escapeHtml(exp.company)} · <em>${escapeHtml(exp.companyEn)}</em>`
      : exp.companyEm
        ? `${escapeHtml(exp.company)}<em>${escapeHtml(exp.companyEm)}</em>`
        : escapeHtml(exp.company);
    const dateHtml = exp.isCurrent
      ? `${escapeHtml(exp.dateFrom)} — <span class="now">${escapeHtml(exp.dateTo)}</span>`
      : `${escapeHtml(exp.dateFrom)} — ${escapeHtml(exp.dateTo)}`;
    const bulletsHtml = exp.bullets.length
      ? `<ul class="exp-bullets">${exp.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>`
      : '';
    return `
      <div class="exp-item" data-reveal>
        <div>
          <div class="exp-co">${coHtml}</div>
          <div class="exp-role">${escapeHtml(exp.role)}</div>
          <p class="exp-desc">${parseMarkup(exp.description)}</p>
          ${bulletsHtml}
        </div>
        <div class="exp-date">${dateHtml}</div>
      </div>
    `;
  }).join('');

  /* ---------- 9. PROJECTS ---------- */
  document.getElementById('proj-meta').textContent = `${R.projects.length} 个 · 点击展开`;
  const projList = document.getElementById('proj-list');
  R.projects.forEach((p, i) => {
    const idx = String(i + 1).padStart(2, '0');
    const summaryHtml = parseMarkup(p.summary);

    const row = document.createElement('li');
    row.className = 'proj-row';
    row.setAttribute('role', 'button');
    row.setAttribute('tabindex', '0');
    row.setAttribute('aria-expanded', 'false');
    row.setAttribute('aria-controls', `pbody-${i}`);
    row.dataset.idx = i;
    row.setAttribute('data-reveal', '');
    row.innerHTML = `
      <span class="idx">P-${idx}</span>
      <span class="yr">${escapeHtml(p.year)}</span>
      <span class="ttl">${titleHtml(p.title)}</span>
      <span class="arr" aria-hidden="true">+</span>
    `;
    projList.appendChild(row);

    const body = document.createElement('li');
    body.className = 'proj-body';
    body.id = `pbody-${i}`;
    body.style.listStyle = 'none';
    body.innerHTML = `
      <div class="proj-body-inner">
        <div class="proj-body-grid">
          <div>
            <p class="proj-summary">${summaryHtml}</p>
            <div class="proj-detail-block">
              <span class="lbl">${escapeHtml(p.whatLbl)}</span>
              <ul>${p.what.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>
            </div>
            <div class="proj-detail-block">
              <span class="lbl">${escapeHtml(p.howLbl)}</span>
              <div class="proj-tags">${p.how.map(x => `<span class="chip chip-ink">${escapeHtml(x)}</span>`).join('')}</div>
            </div>
          </div>
          <aside class="proj-side">
            <span class="lbl">结果 / Impact</span>
            <div class="impact">${escapeHtml(p.impactValue)}<span class="u">${escapeHtml(p.impactUnit)}</span></div>
            <div class="impact-lbl">${escapeHtml(p.impactLabel)}</div>
            <div style="margin-top:var(--s-5)">
              <div class="proj-tags">${p.tags.map(x => `<span class="chip">${escapeHtml(x)}</span>`).join('')}</div>
            </div>
          </aside>
        </div>
      </div>
    `;
    projList.appendChild(body);

    const toggle = () => {
      const open = row.getAttribute('aria-expanded') === 'true';
      row.setAttribute('aria-expanded', open ? 'false' : 'true');
    };
    row.addEventListener('click', toggle);
    row.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    });
  });

  /* ---------- 10. SKILLS ---------- */
  document.getElementById('skills-meta').textContent = `${R.skills.length} 域 · ${R.skills.reduce((s,sk) => s + sk.items.length, 0)}+ 标签`;
  document.getElementById('sk-matrix').innerHTML = R.skills.map(sk => `
    <div class="sk-cell">
      <div class="ix">${escapeHtml(sk.index)}</div>
      <h3>${escapeHtml(sk.category)}<em>${escapeHtml(sk.categoryEm)}</em></h3>
      <ul>${sk.items.map(it => `
        <li>${escapeHtml(it.name)}<span class="lvl">${escapeHtml(it.level)}</span></li>
      `).join('')}</ul>
    </div>
  `).join('');

  /* ---------- 11. CONTACT ---------- */
  const C = R.contact;
  document.getElementById('contact-lead').innerHTML = parseMarkup(C.lead);
  document.getElementById('contact-meta').innerHTML = C.items.map((it, idx) => {
    let val = it.href
      ? `<a href="${escapeHtml(it.href)}">${escapeHtml(it.value)}</a>`
      : it.isLive
        ? `<span class="dot" style="width:8px;height:8px;background:var(--data-up);display:inline-block;border-radius:50%;vertical-align:middle;margin-right:8px"></span>${escapeHtml(it.value)}`
        : escapeHtml(it.value);
    return `
      <div class="contact-meta-row">
        <span class="k">${escapeHtml(it.key)}</span>
        <span class="v">${val}</span>
      </div>
    `;
  }).join('');

  /* ---------- 12. FOOTER ---------- */
  const F = R.footer;
  document.getElementById('foot-sig').innerHTML = parseMarkup(F.signature);
  document.getElementById('foot-watermark').textContent = F.watermark;
  document.getElementById('foot-cols').innerHTML = `
    <div class="foot-col">
      <h4>导航 / Index</h4>
      <a href="#about">01 关于</a>
      <a href="#experience">02 经历</a>
      <a href="#projects">03 项目</a>
      <a href="#skills">04 技能</a>
      <a href="#contact">05 联系</a>
    </div>
    <div class="foot-col">
      <h4>联系 / Reach out</h4>
      <a href="mailto:${escapeHtml(M.email)}">${escapeHtml(M.email)}</a>
      <a href="tel:${escapeHtml(M.phoneTel)}">${escapeHtml(M.phone)}</a>
    </div>
    <div class="foot-col">
      <h4>状态 / Status</h4>
      <p style="color:var(--accent-clay)">● ${escapeHtml(M.jobSearchStatus)}</p>
      <p>2026 · Spring</p>
    </div>
  `;
  document.getElementById('foot-bottom').innerHTML = `
    <span>${escapeHtml(F.copyright)}</span>
    <span>${escapeHtml(F.tagline)}</span>
    <span>${escapeHtml(F.location)}</span>
  `;

  /* ---------- 13. Scroll reveal ---------- */
  (() => {
    if (!('IntersectionObserver' in window)) {
      document.querySelectorAll('[data-reveal]').forEach(el => el.classList.add('is-in'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('is-in');
        } else if (e.boundingClientRect.top > 0) {
          // 元素是从视口底部退出的（往上滑离开了它，它还没被滑到）——
          // 重置状态，下次再往下滑回来时能重新播放一次浮现，形成"呼吸感"。
          // 如果是从顶部退出（继续往下滑过去了），保持 is-in 不重置，
          // 这样往上滑回来看到它时不会莫名其妙又演一遍动画。
          e.target.classList.remove('is-in');
        }
      });
    }, { rootMargin: '0px 0px -80px 0px', threshold: 0.05 });
    document.querySelectorAll('[data-reveal]').forEach(el => io.observe(el));
  })();

  /* ---------- 15. Hero entrance ---------- */
  (() => {
    const card = document.getElementById('sp-card');
    if (!card) return;
    function play() {
      const off = document.documentElement.getAttribute('data-motion') === 'off';
      card.classList.remove('play', 'breathe');
      void card.offsetWidth;
      if (off) { document.documentElement.classList.add('cover-settled'); return; }
      document.documentElement.classList.remove('cover-settled');
      card.classList.add('play');
      setTimeout(() => card.classList.add('breathe'), 1700);
    }
    window.playSpCard = play;
    window.addEventListener('load', () => setTimeout(play, 120));
    setTimeout(() => document.documentElement.classList.add('cover-settled'), 3200);
  })();

  /* ---------- 16. Nav show/hide ---------- */
  (() => {
    const nav = document.getElementById('nav');
    const hero = document.getElementById('hero');
    const onScroll = () => {
      const threshold = hero ? hero.offsetHeight * 0.85 : 400;
      nav.classList.toggle('is-shown', window.scrollY > threshold);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll, { passive: true });
    onScroll();
  })();

  } catch (e) {
    // resume.json 缺字段、DOM id 拼写漂移等任何一处渲染异常都会在这里兜住，
    // 而不是让页面停在半渲染状态却没有任何提示。
    console.error('index.html render error:', e);
    showFatalError('页面渲染出错，内容可能不完整', e && e.message ? e.message : e);
  }

})();
</script>

</body>
</html>
